<!DOCTYPE html>
<html lang="de-CH">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Vodnik Digital Solutions – Vorschauen</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Hanken Grotesk',system-ui,sans-serif;
    background:#15171a;color:#e7e5e1;min-height:100vh;
    display:grid;place-items:center;text-align:center;padding:24px;
    background-image:radial-gradient(600px 400px at 50% 0%, rgba(180,150,90,.08), transparent 60%);
  }
  .badge{display:inline-block;width:14px;height:14px;border-radius:50%;background:#b1853f;margin-bottom:28px}
  h1{font-size:1.7rem;font-weight:600;letter-spacing:-.01em}
  p{color:#8a908f;margin-top:14px;max-width:42ch;font-size:.98rem;line-height:1.6}
  .sig{margin-top:34px;font-size:.78rem;letter-spacing:.2em;text-transform:uppercase;color:#5d6360}
</style>
</head>
<body>
  <main>
    <span class="badge"></span>
    <h1>Vodnik Digital Solutions</h1>
    <p>Dieser Bereich dient der privaten Vorschau von Projekten. Die jeweilige Adresse wird Ihnen direkt mitgeteilt.</p>
    <div class="sig">vodnik.ch</div>
  </main>
</body>
</html>
